<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chest X-Ray Analyzer</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; color: #333; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        input[type="file"] { margin-bottom: 10px; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #results { margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; background-color: #e9e9e9; }
        #preview { max-width: 300px; max-height: 300px; margin-bottom: 10px; border: 1px solid #ddd;}
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin-bottom: 10px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Chest X-Ray Image</h1>
        <input type="file" id="xrayImage" accept="image/png, image/jpeg, image/dicom">
        <img id="preview" src="#" alt="Image Preview" style="display:none;"/>
        <div class="spinner" id="loadingSpinner"></div>
        <button onclick="analyzeImage()">Analyze Image</button>
        <div id="results" style="display:none;">
            <h2>Analysis Results:</h2>
            <pre id="analysisOutput"></pre>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('xrayImage');
        const preview = document.getElementById('preview');
        const resultsDiv = document.getElementById('results');
        const analysisOutput = document.getElementById('analysisOutput');
        const loadingSpinner = document.getElementById('loadingSpinner');

        imageInput.onchange = evt => {
            const [file] = imageInput.files;
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                resultsDiv.style.display = 'none'; // Hide previous results
                analysisOutput.textContent = '';
            } else {
                preview.style.display = 'none';
            }
        }

        async function analyzeImage() {
            const fileInput = document.getElementById('xrayImage');
            if (fileInput.files.length === 0) {
                alert('Please select an image file first.');
                return;
            }

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            loadingSpinner.style.display = 'block';
            resultsDiv.style.display = 'none';
            analysisOutput.textContent = '';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    analysisOutput.textContent = JSON.stringify(data, null, 2);
                } else {
                    analysisOutput.textContent = `Error: ${data.message} (Code: ${data.error_code || response.status})`;
                }
            } catch (error) {
                console.error('Error during analysis:', error);
                analysisOutput.textContent = 'An unexpected error occurred. Please check the console.';
            } finally {
                loadingSpinner.style.display = 'none';
                resultsDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
